ledger:
  name: compression-tool-search
  source_plan: tool-search-plan.md
  token_budget_per_task: 100000
  operating_mode: agent-first

  taboos:
    - do_not_skip_tdd_or_write_production_code_before_red_tests
    - do_not_change_level_max_to_expose_more_than_list_tools
    - do_not_add_manager_aggregator_proxy_state_or_logging_dependencies_to_compression_py
    - do_not_bypass_existing_wrapper_tool_names_or_handle_compressed_call_patterns_with_bespoke_dispatch
    - do_not_change_raw_tool_wire_format_for_uncompressed_or_level_low_backends
    - do_not_dispatch_search_tools_to_the_underlying_backend
    - do_not_replace_existing_catalog_rendering_style_with_a_new_output_format
    - do_not_add_fuzzy_search_ranking_scoring_or_external_search_dependencies
    - do_not_refactor_unrelated_aggregator_proxy_builtin_or_config_code
    - do_not_update_docs_with_terms_that_diverge_from_wrapper_catalog_level_scope_or_wire_format_language
    - do_not_push_changes_to_any_git_remote
    - do_not_commit_unrelated_files_or_secrets

  git:
    history_policy:
      - treat local git history as a project changelog
      - inspect recent commits when task context, naming, style, or intent is unclear
      - prefer commit-message language that matches existing repository style
      - never rewrite history unless explicitly instructed by the user
      - never push to a remote
    per_task_completion:
      - review git status and diff for the task
      - stage only files that belong to the completed task
      - create a local commit for the completed task with a concise message
      - do not include unrelated worktree changes
      - do not include secrets or local-only config

  progress_txt:
    path: progress.txt
    before_each_task:
      - read progress.txt before starting the task
      - use prior gotchas, implicit patterns, handoff notes, and unfinished follow-ups to guide the task
    after_each_task:
      - update progress.txt when the task is complete
      - record task outcome, tests or checks run, newly discovered gotchas or reusable patterns, and any remaining follow-up
    note_policy:
      - only add context that is not already clear in project docs or public upstream docs
      - do not duplicate documented behavior
      - each note should include the discovery, the file or command that revealed it, and the implication for future work

  guardrails:
    - use_tdd_red_green_refactor
    - match_existing_code_and_doc_style
    - keep_compression_helpers_pure
    - preserve_level_max_single_list_tools_wrapper
    - avoid_unrelated_refactors

  tasks:
    - id: red-compression-unit-tests
      title: Add failing compression helper tests
      delegate_to: test-runner
      status: complete
      phase: red
      max_tokens: 100000
      files:
        - tests/test_compression_unit.py
      preflight:
        - read progress.txt
        - inspect git history if task context or style is unclear
      completion:
        - update progress.txt with task outcome, red-test result, gotchas, and follow-ups
        - stage only this task's files
        - create a local commit for this completed task
        - do not push
      objective: Add complete unit tests for search helper behavior and wrapper exposure before production changes.
      acceptance:
        - wrapper_tool_names includes search_tools for non-max levels
        - wrapper_tool_names for max remains only list_tools
        - compressed_tool_list returns get_tool_schema, search_tools, invoke_tool for medium and high
        - search matches tool name, description, and parameter names
        - invalid or missing query returns clear errors
        - limit behavior is covered
        - no-match response is covered
        - focused test run fails for missing search_tools behavior, not syntax or fixture mistakes

    - id: red-aggregator-dispatch-tests
      title: Add failing aggregator dispatch tests
      delegate_to: test-runner
      status: complete
      phase: red
      max_tokens: 100000
      files:
        - tests/test_aggregator_unit.py
      preflight:
        - read progress.txt
        - inspect git history if task context or style is unclear
      completion:
        - update progress.txt with task outcome, red-test result, gotchas, and follow-ups
        - stage only this task's files
        - create a local commit for this completed task
        - do not push
      objective: Prove the aggregator should expose and route search_tools through existing compression dispatch.
      acceptance:
        - non-max compressed tools/list includes backend__search_tools
        - backend__search_tools returns matching compressed catalog lines
        - backend call_tool is not invoked for search_tools
        - max still exposes only backend__list_tools
        - focused test run confirms expected red failures

    - id: green-compression-helper
      title: Implement compression search wrapper
      delegate_to: implementation-worker
      status: complete
      phase: green
      max_tokens: 100000
      files:
        - src/zelosmcp/compression.py
      preflight:
        - read progress.txt
        - inspect git history if task context or style is unclear
      completion:
        - update progress.txt with task outcome, tests run, gotchas, and follow-ups
        - stage only this task's files
        - create a local commit for this completed task
        - do not push
      objective: Add the pure catalog search helper, wrapper builder, and handle_compressed_call branch.
      acceptance:
        - implementation stays pure and state-free
        - search_tools is exported if the helper is public
        - auth_pending behavior mirrors existing wrappers
        - wrapper order follows existing wrapper style
        - max behavior remains unchanged
        - compression unit tests pass

    - id: green-aggregator-proxy-integration
      title: Verify existing routing integration
      delegate_to: implementation-worker
      status: complete
      phase: green
      max_tokens: 100000
      files:
        - src/zelosmcp/aggregator.py
        - src/zelosmcp/proxy.py
      preflight:
        - read progress.txt
        - inspect git history if task context or style is unclear
      completion:
        - update progress.txt with task outcome, tests run, gotchas, and follow-ups
        - stage only this task's files if changed
        - create a local commit if files changed
        - do not push
      objective: Confirm aggregator and proxy pick up search_tools through wrapper_tool_names and handle_compressed_call without bespoke routing.
      acceptance:
        - no production changes are made unless tests reveal a real integration gap
        - aggregator dispatch tests pass
        - per-backend global behavior remains compatible through existing proxy routing

    - id: refactor-style-pass
      title: Refactor against repo styleguide
      delegate_to: implementation-worker
      status: complete
      phase: refactor
      max_tokens: 100000
      files:
        - src/zelosmcp/compression.py
        - tests/test_compression_unit.py
        - tests/test_aggregator_unit.py
      preflight:
        - read progress.txt
        - inspect git history if task context or style is unclear
      completion:
        - update progress.txt with task outcome, tests run, gotchas, and follow-ups
        - stage only this task's files
        - create a local commit for this completed task
        - do not push
      objective: Simplify naming, validation, and test shape after green while preserving behavior.
      acceptance:
        - docstrings match existing compression.py style
        - tests keep class-based grouping and concise assertions
        - no unrelated formatting churn
        - focused tests still pass

    - id: docs-update
      title: Update compression documentation
      delegate_to: docs-reviewer
      status: complete
      phase: refactor
      max_tokens: 100000
      files:
        - docs/compression.md
        - docs/configuration.md
        - docs/cursor-integration.md
        - docs/oauth-passthrough.md
      preflight:
        - read progress.txt
        - inspect git history if task context or style is unclear
      completion:
        - update progress.txt with task outcome, docs changed, gotchas, and follow-ups
        - stage only this task's files
        - create a local commit for this completed task
        - do not push
      objective: Document search_tools consistently wherever compressed wrappers are described.
      acceptance:
        - docs explain non-max wrapper trio
        - docs state max remains single list_tools wrapper
        - terminology matches existing docs
        - only affected references are updated

    - id: final-validation
      title: Run focused validation
      delegate_to: verifier
      status: complete
      phase: validation
      max_tokens: 100000
      preflight:
        - read progress.txt
        - inspect git history if final context is unclear
      completion:
        - update progress.txt with final validation result, remaining risks, and follow-ups
        - stage only validation-related files if changed
        - create a local commit if files changed
        - do not push
      objective: Confirm red-green-refactor completed cleanly.
      commands:
        - pytest tests/test_compression_unit.py tests/test_aggregator_unit.py
      acceptance:
        - focused suite passes
        - broadened tests are run if implementation touched wider behavior
        - any remaining risk or skipped validation is reported
