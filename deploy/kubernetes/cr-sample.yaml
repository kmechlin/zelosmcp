# Operator-driven install. Apply this CR after installing the zelosai operator.
# The operator injects auth.key + providers.json as Secret file mounts,
# creates the PVC at /var/lib/zelos/zelosmcp/, and configures probes against
# /healthz + /readyz per the suite container contract.
apiVersion: zelos.zelosai.io/v1alpha1
kind: ZelosMCP
metadata:
  name: default
  namespace: zelos
spec:
  replicas: 1
  image:
    repository: ghcr.io/zelosai/zelosmcp
    tag: develop
  imagePullSecrets:
    - name: ghcr-pull-secret
  persistence:
    enabled: true
    size: 1Gi
  authProviderSecretRef: zelos-mcp-auth
  mcpServersConfigMapRef: zelosmcp-mcp-servers
  config:
    ZELOSMCP_LOG_FORMAT: "json"
