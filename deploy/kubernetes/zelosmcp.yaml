# zelosmcp Kubernetes manifest aligned with the Zelos suite container contract
# (see zelosai/docs/architecture/07-container-contract.md).
#
# Object set:
#   - ServiceAccount   (zelos-zelosmcp)
#   - ConfigMap        (mcpServers catalog; low-sensitivity)
#   - Secret           (auth-providers config + AES Fernet key)
#   - PersistentVolumeClaim   (SQLite DBs + auth.key, mounted at
#                              /var/lib/zelos/zelosmcp/)
#   - Deployment       (replicas: 1; multi-replica needs identical auth.key
#                       across Pods and an RWX-class PVC)
#   - Service          (ClusterIP :8000)
#
# Apply with:
#   kubectl create namespace zelos
#   kubectl apply -n zelos -f ghcr-pull-secret.example.yaml   # after editing
#   kubectl apply -n zelos -f zelosmcp.yaml
#
# Standard placeholders to fill in:
#   - <BASE64-DOCKERCONFIGJSON>  the ghcr-pull-secret payload
#   - YOUR_FERNET_KEY            base64 Fernet key (see deploy/README.md)
#   - YOUR_GH_CLIENT_ID          GitHub OAuth app client_id
#   - YOUR_OKTA_*                Okta authorization_code values (or remove)
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: zelos-zelosmcp
  labels:
    app.kubernetes.io/name: zelosmcp
    app.kubernetes.io/part-of: zelos
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: zelosmcp-mcp-servers
  labels:
    app.kubernetes.io/name: zelosmcp
    app.kubernetes.io/part-of: zelos
data:
  mcp-servers.json: |
    {
      "mcpServers": {
        "github": {
          "type": "streamable-http",
          "url": "https://api.githubcopilot.com/mcp/",
          "passthrough": true,
          "auth": { "provider": "github_oauth_app" }
        }
      }
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: zelosmcp-config
  labels:
    app.kubernetes.io/name: zelosmcp
    app.kubernetes.io/part-of: zelos
data:
  HOST: 0.0.0.0
  PORT: "8000"
  ZELOSMCP_LOG_FORMAT: json
---
apiVersion: v1
kind: Secret
metadata:
  name: zelos-mcp-auth
  labels:
    app.kubernetes.io/name: zelosmcp
    app.kubernetes.io/part-of: zelos
type: Opaque
stringData:
  # Fernet key — generated ONCE per deployment. Lose this and every
  # stored token becomes undecryptable.
  auth.key: "YOUR_FERNET_KEY"

  # Provider client_ids — also surfaced as env (see Deployment) so ${VAR}
  # substitution inside providers.json resolves at config-load time.
  ZELOSMCP_GITHUB_CLIENT_ID: "YOUR_GH_CLIENT_ID"
  ZELOSMCP_OKTA_ISSUER: "https://nike.okta.com/oauth2/default"
  ZELOSMCP_OKTA_CLIENT_ID: "YOUR_OKTA_CLIENT_ID"
  ZELOSMCP_OKTA_REDIRECT_URI: "http://localhost:8000/api/auth/nike_okta/callback"
  ZELOSMCP_OKTA_MEMBERSHIP_HINT: "Nike.uee.maria"

  providers.json: |
    {
      "providers": {
        "github_oauth_app": {
          "type": "github_device_flow",
          "client_id": "${ZELOSMCP_GITHUB_CLIENT_ID}",
          "scopes": ["repo", "read:org", "user:email", "gist", "workflow"]
        },
        "nike_okta": {
          "type": "okta_authorization_code",
          "issuer": "${ZELOSMCP_OKTA_ISSUER}",
          "client_id": "${ZELOSMCP_OKTA_CLIENT_ID}",
          "redirect_uri": "${ZELOSMCP_OKTA_REDIRECT_URI}",
          "scopes": ["openid", "profile", "email"],
          "membership_hint": "${ZELOSMCP_OKTA_MEMBERSHIP_HINT}"
        }
      }
    }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: zelosmcp
  labels:
    app.kubernetes.io/name: zelosmcp
    app.kubernetes.io/part-of: zelos
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: zelosmcp
  labels:
    app.kubernetes.io/name: zelosmcp
    app.kubernetes.io/part-of: zelos
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: zelosmcp
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zelosmcp
  labels:
    app.kubernetes.io/name: zelosmcp
    app.kubernetes.io/part-of: zelos
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: zelosmcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zelosmcp
        app.kubernetes.io/part-of: zelos
    spec:
      serviceAccountName: zelos-zelosmcp
      imagePullSecrets:
        - name: ghcr-pull-secret
      volumes:
        - name: mcp-servers
          configMap:
            name: zelosmcp-mcp-servers
        - name: auth-config
          secret:
            secretName: zelos-mcp-auth
            defaultMode: 0400
        - name: state
          persistentVolumeClaim:
            claimName: zelosmcp
      containers:
        - name: zelosmcp
          image: ghcr.io/zelosai/zelosmcp:develop
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: zelosmcp-config
          env:
            - name: OTEL_SERVICE_NAME
              value: zelosmcp
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            # Suite-standard secret file paths.
            - name: ZELOSMCP_AUTH_KEY_FILE
              value: /etc/zelos/secrets/auth.key
            - name: ZELOSMCP_AUTH_PROVIDERS_FILE
              value: /etc/zelos/secrets/providers.json
            # Persistent state lives under /var/lib/zelos/zelosmcp/.
            - name: ZELOSMCP_STATE_DIR
              value: /var/lib/zelos/zelosmcp
            # Provider IDs surfaced as env so ${VAR} substitution in
            # providers.json resolves at config-load time.
            - name: ZELOSMCP_GITHUB_CLIENT_ID
              valueFrom: { secretKeyRef: { name: zelos-mcp-auth, key: ZELOSMCP_GITHUB_CLIENT_ID } }
            - name: ZELOSMCP_OKTA_ISSUER
              valueFrom: { secretKeyRef: { name: zelos-mcp-auth, key: ZELOSMCP_OKTA_ISSUER, optional: true } }
            - name: ZELOSMCP_OKTA_CLIENT_ID
              valueFrom: { secretKeyRef: { name: zelos-mcp-auth, key: ZELOSMCP_OKTA_CLIENT_ID, optional: true } }
            - name: ZELOSMCP_OKTA_REDIRECT_URI
              valueFrom: { secretKeyRef: { name: zelos-mcp-auth, key: ZELOSMCP_OKTA_REDIRECT_URI, optional: true } }
            - name: ZELOSMCP_OKTA_MEMBERSHIP_HINT
              valueFrom: { secretKeyRef: { name: zelos-mcp-auth, key: ZELOSMCP_OKTA_MEMBERSHIP_HINT, optional: true } }
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          volumeMounts:
            - name: mcp-servers
              mountPath: /etc/zelosmcp/mcp-servers.json
              subPath: mcp-servers.json
              readOnly: true
            - name: auth-config
              mountPath: /etc/zelos/secrets/providers.json
              subPath: providers.json
              readOnly: true
            - name: auth-config
              mountPath: /etc/zelos/secrets/auth.key
              subPath: auth.key
              readOnly: true
            - name: state
              mountPath: /var/lib/zelos/zelosmcp
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { memory: 1Gi }
