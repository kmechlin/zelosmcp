# GHCR pull secret. Standard suite name: `ghcr-pull-secret`.
# See zelosai/docs/architecture/10-image-registry.md for the recipe.
#
# To generate via kubectl:
#   kubectl create secret docker-registry ghcr-pull-secret \
#     --docker-server=ghcr.io \
#     --docker-username=<github-user-or-org> \
#     --docker-password=<PAT-with-read:packages> \
#     --docker-email=<email>
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-pull-secret
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: <base64-dockerconfigjson>
