# zelosMCP container volume mounts (consumed by `make zelosmcp-up`).
#
# Each non-comment line is a `docker run -v` spec. Format:
#   <host-path-or-named-volume>:<container-path>[:options]
#
# Lines starting with `#` (and trailing `# ...` after a spec) are comments.
# Blank lines are ignored.
#
# These shell variables are expanded at `make zelosmcp-up` time:
#   $HOME                     your home directory
#   $USER_DATA_ROOT           Host directory exposed to MCP backends
#                             (default $HOME). Bind-mounted twice into
#                             the container — rw for filesystem MCP,
#                             ro for pincher / read-only consumers.
#   $KUBERNETES_CONFIG_FILE   kubeconfig path           (default $HOME/.kube/config)
#   $DOCKER_SOCK_FILE         host docker socket        (default /var/run/docker.sock,
#                                                         which Docker Desktop and
#                                                         Rancher Desktop both expose
#                                                         inside their VM; override to
#                                                         $HOME/.rd/docker.sock if you
#                                                         run Rancher Desktop without
#                                                         admin access AND switch
#                                                         `docker context use
#                                                         rancher-desktop` first)
#
# Override which file the Makefile reads:
#   make zelosmcp-up ZELOSMCP_VOLUMES_FILE=/path/to/your-volumes.conf
#
# Named volumes (no leading `/`) are managed by Docker and survive
# `docker rm`, so caches/indexes don't have to be rebuilt on every restart.

# kubeconfig — read-only so kubernetes-mcp-server can talk to your cluster
# without risking in-container writes mutating your local config.
$KUBERNETES_CONFIG_FILE:/root/.kube/config:ro

# User data — exposed twice from the same host directory so writes go
# through the rw mount (filesystem MCP) and read-only consumers (pincher
# index, audit-style tools) bind through the ro mount where the kernel
# rejects writes. Single source of truth ($USER_DATA_ROOT, default
# $HOME); dual contract.
#
# `make zelosmcp-warm-index` indexes /user_data_ro/<rel-to-USER_DATA_ROOT>
# (the current git repo); `make zelosmcp-warm-index-full` indexes the
# whole /user_data_ro mount.
$USER_DATA_ROOT:/user_data_rw
$USER_DATA_ROOT:/user_data_ro:ro

# npm cache — npx-launched MCP backends (kubernetes-mcp-server,
# @modelcontextprotocol/server-filesystem) reuse downloaded packages.
zelosmcp-npm:/root/.npm

# uv / pip cache + chrome-devtools-mcp persistent profile — uvx-launched
# MCP backends reuse downloaded wheels and any tree-sitter grammars they
# need; chrome-devtools-mcp also lives under this prefix at
# `/root/.cache/chrome-devtools-mcp/chrome-profile-$CHANNEL`, so a
# logged-in browser session (cookies, localStorage, extensions) survives
# container restarts. Add `--isolated` to the chrome-devtools-mcp args
# in your config if you want a fresh profile every run instead.
#
# NOTE: chrome-devtools-mcp launches a real Chrome instance, which is
# NOT installed in the default zelosmcp image. To use it inside the
# container you'll need to either: (a) extend the Dockerfile to install
# Chromium + its system deps, or (b) point chrome-devtools-mcp at a
# Chrome running on the host via `--browserUrl http://host.docker.
# internal:9222` after starting Chrome on the host with
# `--remote-debugging-port=9222`. The cache volume below covers (b)
# only when the host's profile lives at the matching path.
zelosmcp-cache:/root/.cache

# pincher persistent storage — keeps the SQLite codebase index
# (pincher.db plus the WAL/SHM siblings) across restarts so the first
# agent call after each restart doesn't pay the full re-index cost.
# pincher writes to whatever `--data-dir` is passed (set in
# configs/default-zelosmcp.json).
zelosmcp-pincher:/tmp/pincher

# zelosMCP persistent state — keeps:
#   - savings.sqlite (+ WAL/SHM siblings) for the token-savings dashboard
#   - auth.sqlite (+ WAL/SHM siblings) for the encrypted per-user OAuth
#     token store backing the auth providers
#   - auth.key for the AES key that encrypts auth.sqlite at rest
# All four files live under `Path.home() / ".zelosmcp"` inside the
# container, which is `/root/.zelosmcp` (root user). One named volume
# covers all of them so a `docker rm` doesn't lose users' OAuth tokens
# alongside their savings dashboard history.
#
# Override the savings file via ZELOSMCP_SAVINGS_DB; override the auth
# DB / key via ZELOSMCP_AUTH_DB / ZELOSMCP_AUTH_KEY_FILE.
#
# IMPORTANT for k8s deploys: `auth.key` MUST come from a Kubernetes
# Secret (mounted in via deploy/kubernetes/zelosmcp.yaml) rather than
# auto-generated per-pod. Otherwise a Pod restart loses the key and
# every encrypted token in auth.sqlite becomes undecryptable.
zelosmcp-savings:/root/.zelosmcp

# Docker socket — gives mcp-server-docker access to the host Docker daemon.
# Default `/var/run/docker.sock` works with Docker Desktop and with Rancher
# Desktop in admin-access mode (both expose that path inside their VM).
# IMPORTANT: the daemon you reach is whichever one your active `docker
# context` points at when `make zelosmcp-up` runs, NOT necessarily the one
# in your `default-zelosmcp.json`'s name. To use Rancher Desktop's daemon
# specifically, first run `docker context use rancher-desktop` then override
# this line via:
#   make zelosmcp-up DOCKER_SOCK_FILE=$HOME/.rd/docker.sock
# NOTE: This is effectively root-on-host; only mount it on dev machines.
$DOCKER_SOCK_FILE:/var/run/docker.sock
