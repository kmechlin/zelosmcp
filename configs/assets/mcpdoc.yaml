backend: mcpdoc
seed_version: 2

rules:
  sections:
    playbook_read_only:
      body: |
        ### `mcpdoc`

        Use mcpdoc for external docs published through `llms.txt`. Fetch
        only the pages needed for the question.

    playbook_read_write:
      body: |
        ### `mcpdoc`

        mcpdoc itself is read-only. Use it to gather references before
        writing code or docs through other backends.

  tool_instructions:
    list_doc_sources:
      body: |
        Call first to see which external docs sources are configured.
    fetch_docs:
      body: |
        Fetch only URLs from a configured `llms.txt` index or pages discovered from that index.

agents: {}

skills:
  doc-research:
    description: >-
      Targeted external documentation lookup through mcpdoc. Use when a
      task depends on framework or library docs published via llms.txt.
    targets: [cursor, vscode]
    argument_hint: "[library, framework, or concept]"
    context: fork
    body: |
      # Doc Research

      Use this skill for external documentation research without scraping
      or broad browsing.

      ## Workflow

      1. Call `list_doc_sources`.
      2. Fetch the relevant `llms.txt` index.
      3. Fetch only the pages needed to answer the question.
      4. Summarize the answer with source URLs.

      ## Guardrails

      - Do not guess URLs.
      - Prefer narrow pages over broad manuals.
      - Use pincher, not mcpdoc, for local project docs.

hooks: {}
