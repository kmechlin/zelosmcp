backend: zelosmcp
seed_version: 3
# Global assets for the always-on zelosmcp builtin backend.
# These are included in every push regardless of which user backends are running.

rules:
  sections:
    directive_read_only:
      body: |
        ## Access mode: READ-ONLY

        **Do not call** any tool tagged `[mutates]`, `[destructive]`, or `[?]`. They modify backend state, and this rule is currently configured for safe inspection only. If a task requires mutation, ask the user to regenerate the rule with `access=read-write` (e.g. via the Cursor rule panel in the zelosMCP web UI at `http://localhost:8000`).

    directive_read_write:
      body: |
        ## Access mode: READ-WRITE

        Tools tagged `[mutates]` and `[destructive]` change backend state. Confirm with the user before calling `[destructive]` tools (irreversible). Tools tagged `[?]` have ambiguous mutability — call only when context makes it clear they're inspection-only.

    directive_tool_use_priority:
      body: |
        ## Tool-use priority

        **Always prefer the MCP tools listed below over shell commands, subprocess invocations, or local CLIs** when an MCP tool covers the task. They return structured data, avoid subprocess cost, and keep paths inside the sandboxed mounts. Reach for `bash` / `python -c` / direct file reads only when no MCP tool fits, and say so explicitly when you do.

    self_check_gate:
      body: |
        ## Pre-flight check (run BEFORE every response)

        Answer these four questions before issuing any tool call. The first matching YES dictates your FIRST tool call:

        1. **Code structure / symbols / behavior?** ("summarize / explain / understand / find / trace / impact / blast radius" of repo, module, function, class) → FIRST call MUST be `pincher__*` (see Mandatory playbook → pincher).
        2. **Files in the workspace?** ("read / edit / list / search / move / create" a file or directory) → FIRST call MUST be `filesystem__*` (see Mandatory playbook → filesystem).
        3. **Containers, kubernetes pods, networks, volumes?** → use `docker__*` / `kubernetes__*`. Do NOT shell out for `docker ps`, `kubectl get`, etc.
        4. **None of the above?** You may use `Shell` / `Read` / `Grep`, but only after stating which question you answered NO to and why no MCP tool fits.

    compressed_rules_read_only:
      body: |
        ## Compressed backends

        One or more backends below expose their tools via a **compressed wrapper trio** at `/mcp` instead of their full tool surface. The actual callable tools for these backends are `<backend>__get_tool_schema`, `<backend>__search_tools`, and `<backend>__invoke_tool` (or `<backend>__list_tools` at level=max).

        **Do NOT call underlying tool names directly** (e.g. `pincher__architecture`) — the aggregator rejects them with "unknown tool". Use the wrapper pattern:

        1. **Discover:** browse the compact catalog embedded in `<backend>__get_tool_schema`'s description, or call `<backend>__search_tools(query="...", limit=5)` for targeted search by name / description.
        2. **Schema (optional):** `<backend>__get_tool_schema(tool_name="...")` returns the full JSON schema for one underlying tool.
        3. **Invoke:** `<backend>__invoke_tool(tool_name="...", tool_input={...})`. Results are forwarded verbatim — identical to calling the tool directly. In read-only mode, do NOT invoke tools tagged `[mutates]`, `[destructive]`, or `[?]` via the wrapper.

        Underlying tool names and per-tool descriptions are listed in each compressed backend's section below under **Underlying tools**.

    compressed_rules_read_write:
      body: |
        ## Compressed backends

        One or more backends below expose their tools via a **compressed wrapper trio** at `/mcp` instead of their full tool surface. The actual callable tools for these backends are `<backend>__get_tool_schema`, `<backend>__search_tools`, and `<backend>__invoke_tool` (or `<backend>__list_tools` at level=max).

        **Do NOT call underlying tool names directly** (e.g. `pincher__architecture`) — the aggregator rejects them with "unknown tool". Use the wrapper pattern:

        1. **Discover:** browse the compact catalog embedded in `<backend>__get_tool_schema`'s description, or call `<backend>__search_tools(query="...", limit=5)` for targeted search by name / description.
        2. **Schema (optional):** `<backend>__get_tool_schema(tool_name="...")` returns the full JSON schema for one underlying tool.
        3. **Invoke:** `<backend>__invoke_tool(tool_name="...", tool_input={...})`. Confirm with the user before invoking any underlying tool tagged `[destructive]`.

        Underlying tool names and per-tool descriptions are listed in each compressed backend's section below under **Underlying tools**.

extensions: {}

agents: {}

hooks: {}
