skills:
  zelosmcp-onboarding:
    description: >-
      Understand available zelosMCP backends, compressed MCP wrappers
      (`<backend>__invoke_tool`, `<backend>__search_tools`,
      `<backend>__get_tool_schema`), access modes, and the zelos
      orchestration workflow.
    targets: [cursor, vscode]
    argument_hint: "[question about zelosmcp capabilities or setup]"
    body: |
      # zelosMCP Onboarding

      zelosMCP exposes multiple MCP backends behind
      `http://localhost:8000/mcp`.

      ## Core facts

      - Tools are namespaced as `<backend>__<tool>`.
      - Many backends are compressed, so you call them through
        `<backend>__search_tools`, `<backend>__get_tool_schema`, and
        `<backend>__invoke_tool(tool_name="...", tool_input={...})`.
      - Read paths go through `/user_data_ro/<repo>` and write paths go
        through `/user_data_rw/<repo>`.

      ## Wrapper pattern

      - Use `<backend>__search_tools` when you are unsure which
        underlying backend operation matches the task.
      - Use `<backend>__get_tool_schema` only when the input shape is
        unclear.
      - Use `<backend>__invoke_tool(tool_name="...", tool_input={...})`
        to execute backend operations directly.
      - For code work, prefer `pincher__invoke_tool` and
        `filesystem__invoke_tool` over shell fallback.

      ## Working model

      - Use `zelos` to decompose work.
      - Use persona agents for focused execution.
      - Use skills for detailed workflows; forked skills keep token-heavy
        work out of the parent thread.
      - Use prompts for narrow repeatable shortcuts.

      ## Management

      Visit the zelosMCP web UI at `http://localhost:8000` to start or
      stop backends, edit assets, and push updates into the repo.

  tool-guide:
    description: >-
      Route a task to the right MCP backend and compressed wrapper calls
      such as `pincher__invoke_tool`, `filesystem__invoke_tool`, and
      `<backend>__search_tools`. Use when you know the goal but not the
      right tool surface.
    targets: [cursor, vscode]
    argument_hint: "[task or backend to route]"
    body: |
      # Tool Guide

      Use this skill when you know the task but not the backend or
      wrapper call.

      ## Routing

      - Code structure, symbols, callers, or change impact ->
        `pincher__search_tools` then `pincher__invoke_tool`
      - Workspace files and edits -> `filesystem__search_tools` then
        `filesystem__invoke_tool`
      - External package or framework docs -> `mcpdoc__search_tools`
        then `mcpdoc__invoke_tool` when available
      - Containers or clusters -> `docker__search_tools` or
        `kubernetes__search_tools`, then the matching `__invoke_tool`

      ## Wrapper pattern

      1. Use `<backend>__search_tools` to find the underlying tool.
      2. Use `<backend>__get_tool_schema` only when you need the input shape.
      3. Use `<backend>__invoke_tool(tool_name="...", tool_input={...})`
         to execute it.
      4. Do not call compressed underlying tool names directly.

      ## Cost rule

      Keep the parent thread small. Use forked skills for multi-step
      analysis, research, planning, and review.

  code-review:
    description: >-
      Review a change set for regressions, risky behavior, missing tests,
      and documentation gaps with pincher MCP wrappers
      (`pincher__invoke_tool`, `pincher__search_tools`,
      `pincher__get_tool_schema`). Use when validating code before
      merge.
    targets: [cursor, vscode]
    argument_hint: "[diff, files, or feature to review]"
    context: fork
    body: |
      # Code Review

      Use this skill for focused review work that should not pollute the
      parent context.

      ## Wrapper pattern

      - Use `pincher__search_tools` when you are unsure whether
        `changes`, `trace`, or `context` is the right starting point.
      - Use `pincher__get_tool_schema` only when the tool input shape is
        unclear.
      - Use `pincher__invoke_tool(tool_name="...", tool_input={...})`
        to execute review-relevant pincher operations.

      ## Workflow

      1. Identify the changed files or symbols.
      2. Use `pincher__invoke_tool(tool_name="changes", ...)`,
         `pincher__invoke_tool(tool_name="trace", ...)`, and
         `pincher__invoke_tool(tool_name="context", ...)` to
         understand impact.
      3. Check regressions, validation, error handling, public API changes,
         tests, and relevant docs.
      4. Return only actionable findings, open risks, and recommended
         validation.

      ## Output

      - Findings first
      - Risks still unverified
      - Recommended validation or follow-up
