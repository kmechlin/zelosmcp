backend: filesystem
seed_version: 8

rules:
  sections:
    playbook_read_only:
      body: |
        ### `filesystem`

        Use filesystem for workspace file reads, file search, and directory
        views. Translate every path into `/user_data_ro/<repo>/...` first.

    playbook_read_write:
      body: |
        ### `filesystem`

        Use filesystem for targeted edits and file operations. Write only to
        `/user_data_rw/<repo>/...` and prefer `edit_file` over `write_file`.

  tool_instructions:
    read_text_file:
      body: |
        Use `head` or `tail` for large files and prefer this over generic file reads.
    read_multiple_files:
      body: |
        Use for side-by-side summaries or comparisons to reduce round trips.
    edit_file:
      body: |
        Prefer for targeted edits because it returns a diff and avoids full rewrites.
    search_files:
      body: |
        Use recursive globs like `**/*.ext` instead of shell `find`.
    directory_tree:
      body: |
        Use for repo shape or directory overviews with `excludePatterns` to skip noise.

extensions: {}

agents: {}

hooks: {}

prompts:
  read-translated:
    description: "Translate a host path and read it with filesystem."
    args:
      - name: host_path
        description: "Host path under /Users/KMECHL/workspace or an already-translated container path."
        required: true
    targets: [cursor]
    body: |
      Read `{{host_path}}` with filesystem after translating it to a container path.

      If the input starts with `/Users/KMECHL/workspace/`, translate it to `/user_data_ro/`. Example: `/Users/KMECHL/workspace/zelosmcp/README.md` becomes `/user_data_ro/zelosmcp/README.md`.

      **If filesystem is wire-compressed**:

      `filesystem__invoke_tool(tool_name="read_text_file", tool_input={"path": "<translated /user_data_ro path>"})`

      **If filesystem is uncompressed**:

      `filesystem__read_text_file(path="<translated /user_data_ro path>")`

      Never pass `/Users/...` to the filesystem backend.

  tree-here:
    description: "List a repo tree using the container read-only path."
    args:
      - name: project
        description: "Repo basename under /user_data_ro, e.g. zelosmcp."
        required: true
    targets: [cursor]
    body: |
      Return a directory tree for project `{{project}}` using the container path `/user_data_ro/{{project}}`.

      **If filesystem is wire-compressed**:

      `filesystem__invoke_tool(tool_name="directory_tree", tool_input={"path": "/user_data_ro/{{project}}", "excludePatterns": [".git", "node_modules", ".venv"]})`

      **If filesystem is uncompressed**:

      `filesystem__directory_tree(path="/user_data_ro/{{project}}", excludePatterns=[".git", "node_modules", ".venv"])`

      Summarize the tree and call out likely entry points.

  safe-edit:
    description: "Edit a file with filesystem using the read-write mount."
    args:
      - name: container_path
        description: "Read-write container path under /user_data_rw."
        required: true
      - name: old
        description: "Exact text to replace."
        required: true
      - name: new
        description: "Replacement text."
        required: true
    targets: [cursor]
    body: |
      Safely edit `{{container_path}}` with filesystem.

      Confirm the path starts with `/user_data_rw/`. If the user supplied a host path under `/Users/KMECHL/workspace/`, translate it to `/user_data_rw/` before editing. Do not edit in read-only mode.

      **If filesystem is wire-compressed**:

      `filesystem__invoke_tool(tool_name="edit_file", tool_input={"path": "{{container_path}}", "edits": [{"oldText": "{{old}}", "newText": "{{new}}"}]})`

      **If filesystem is uncompressed**:

      `filesystem__edit_file(path="{{container_path}}", edits=[{"oldText": "{{old}}", "newText": "{{new}}"}])`

      Review the returned diff before continuing.

skills:
  file-operations:
    description: >-
      Sandboxed file access and editing via filesystem MCP wrappers
      (`filesystem__invoke_tool`, `filesystem__search_tools`,
      `filesystem__get_tool_schema`). Use when reading, searching, or
      changing files in the workspace.
    targets: [cursor, vscode]
    argument_hint: "[path, search, or edit goal]"
    body: |
      # File Operations

      Use this skill for workspace file access through filesystem's
      compressed MCP wrappers with correct path translation and minimal
      shell fallback.

      ## Wrapper pattern

      - Use `filesystem__search_tools` when you are unsure which
        filesystem operation fits the task.
      - Use `filesystem__get_tool_schema` only when the input shape is
        unclear.
      - Use
        `filesystem__invoke_tool(tool_name="...", tool_input={...})`
        to execute filesystem operations.

      ## Path rule

      - Translate host paths before every call.
      - Read with `/user_data_ro/<repo>/...`.
      - Write with `/user_data_rw/<repo>/...`.

      ## Workflow

      1. Read with
         `filesystem__invoke_tool(tool_name="read_text_file", ...)` or
         `filesystem__invoke_tool(tool_name="read_multiple_files", ...)`.
      2. Search with
         `filesystem__invoke_tool(tool_name="search_files", ...)` or
         `filesystem__invoke_tool(tool_name="directory_tree", ...)`.
      3. Edit with
         `filesystem__invoke_tool(tool_name="edit_file", ...)`; reserve
         `filesystem__invoke_tool(tool_name="write_file", ...)` for
         full rewrites.
      4. Review the returned diff before continuing.

      ## Guardrails

      - Do not shell out for `cat`, `ls`, `find`, or `sed` when
        filesystem covers the task.
      - Do not write in read-only mode.

      ## Output

      - The translated path or paths used.
      - The files read, searched, or edited.
      - The returned diff or a concise summary of the result.

      ## Close

      - Stop after the requested read, search, or edit is complete.
      - Do not keep scanning adjacent files unless they are needed to
        finish the stated request.
      - If a path, mode, or exact edit target is missing, return that
        blocker and end instead of guessing.
