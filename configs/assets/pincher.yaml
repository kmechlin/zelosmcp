backend: pincher
seed_version: 8

rules:
  sections:
    playbook_read_only:
      body: |
        ### `pincher`

        Use pincher for code structure, symbol search, caller tracing, and
        blast radius work. Prefer it before broad file reads when the task
        is about code behavior.

    playbook_read_write:
      body: |
        ### `pincher`

        Use pincher first to understand the owning symbols and likely blast
        radius, then hand editing to filesystem-backed workflows.

  tool_instructions:
    search:
      body: |
        Start here when you know a name or concept but not the exact symbol ID.
    context:
      body: |
        Fetch one symbol plus direct callees in one shot; prefer this over reading many files.
    architecture:
      body: |
        Call once per unfamiliar repo or subsystem to get entry points, hotspots, and language mix.
    trace:
      body: |
        Use for callers, callees, and impact chains before changing shared code.
    changes:
      body: |
        Use before review or commit to map changed symbols, impacted callers, and likely tests.
    adr:
      body: |
        Recall or store durable project knowledge when prior decisions matter.

extensions:
  index_project:
    label: "Index in pincher"
    description: "Run pincher__index on the selected repo path"
    tool: index
    args_template:
      path: "{ctx.repo.ro_path}"
    targets:
      - repos_row
    requires_running: true
    confirm: false
    success:
      message: "Indexed {result.symbols} symbol(s) in {result.duration_ms}ms"
    error:
      message: "Indexing failed: {error}"

  view_dashboard:
    label: "Open dashboard"
    description: "Open the pincher analytics dashboard in a new tab"
    type: link
    href: "{ctx.proxy.mount}/v1/dashboard"
    targets:
      - server_details
    requires_running: true

agents: {}

prompts:
  find-callers:
    description: "Find callers of a symbol using pincher trace."
    args:
      - name: symbol_name
        description: "Function, class, or method name to trace."
        required: true
      - name: project
        description: "Repo basename, e.g. zelosmcp. Do not pass a host path."
        required: false
    targets: [cursor]
    body: |
      Find callers of `{{symbol_name}}` in project `{{project}}` (defaults to the current repo basename if blank).

      First translate any host path context to the container project name. For `/Users/KMECHL/workspace/zelosmcp`, use `project="zelosmcp"`.

      **If pincher is wire-compressed** (the catalog exposes `pincher__invoke_tool` instead of `pincher__trace`):

      `pincher__invoke_tool(tool_name="trace", tool_input={"name": "{{symbol_name}}", "project": "{{project}}", "direction": "in", "depth": 3})`

      **If pincher is uncompressed**:

      `pincher__trace(name="{{symbol_name}}", project="{{project}}", direction="in", depth=3)`

      Summarize CRITICAL/HIGH/MEDIUM callers and cite stable pincher IDs.

  read-context:
    description: "Read one symbol and direct dependencies using pincher context."
    args:
      - name: symbol_id
        description: "Stable pincher symbol ID."
        required: true
      - name: project
        description: "Repo basename, e.g. zelosmcp."
        required: false
    targets: [cursor]
    body: |
      Read symbol context for `{{symbol_id}}` in project `{{project}}`.

      **If pincher is wire-compressed**:

      `pincher__invoke_tool(tool_name="context", tool_input={"id": "{{symbol_id}}", "project": "{{project}}", "fields": "symbol,callees"})`

      **If pincher is uncompressed**:

      `pincher__context(id="{{symbol_id}}", project="{{project}}", fields="symbol,callees")`

      Explain the symbol, its direct callees, and any path-sensitive assumptions.

  blast-radius:
    description: "Analyze current git diff blast radius with pincher changes."
    args: []
    targets: [cursor]
    body: |
      Analyze the current working-tree blast radius with pincher.

      **If pincher is wire-compressed**:

      `pincher__invoke_tool(tool_name="changes", tool_input={"scope": "staged"})`

      **If pincher is uncompressed**:

      `pincher__changes(scope="staged")`

      If there are no staged changes, rerun with `scope="unstaged"` and then `scope="all"` as needed. Summarize changed symbols, impacted callers, and tests to run.

  index-here:
    description: "Index this repo in pincher using the container read-only path."
    args:
      - name: project
        description: "Repo basename under /user_data_ro, e.g. zelosmcp."
        required: true
    targets: [cursor]
    body: |
      Index project `{{project}}` in pincher.

      Translate host paths before calling pincher. For `/Users/KMECHL/workspace/{{project}}`, pass `/user_data_ro/{{project}}`.

      **If pincher is wire-compressed**:

      `pincher__invoke_tool(tool_name="index", tool_input={"path": "/user_data_ro/{{project}}"})`

      **If pincher is uncompressed**:

      `pincher__index(path="/user_data_ro/{{project}}")`

      After indexing, call `architecture` scoped to `project="{{project}}"` to verify the project is usable.

hooks: {}

skills:
  codebase-explore:
    description: >-
      Read-only codebase exploration with pincher MCP wrappers
      (`pincher__invoke_tool`, `pincher__search_tools`,
      `pincher__get_tool_schema`). Use for symbol lookup, behavior
      tracing, and focused implementation planning.
    targets: [cursor, vscode]
    argument_hint: "[question, symbol, or subsystem]"
    context: fork
    body: |
      # Codebase Explore

      Use pincher's compressed MCP wrappers to understand code with
      minimal file reads.

      ## Wrapper pattern

      - Use `pincher__search_tools` when you are unsure which pincher
        operation fits the task.
      - Use `pincher__get_tool_schema` only when the input shape is
        unclear.
      - Use `pincher__invoke_tool(tool_name="...", tool_input={...})`
        to execute pincher operations.

      ## Workflow

      1. Start with `pincher__invoke_tool(tool_name="architecture", ...)`
         once per unfamiliar repo or subsystem.
      2. Use `pincher__invoke_tool(tool_name="search", ...)` to find
         likely symbols.
      3. Use `pincher__invoke_tool(tool_name="context", ...)` for one
         symbol at a time.
      4. Use `pincher__invoke_tool(tool_name="trace", ...)` when
         callers, callees, or impact matter.
      5. Return the owning symbols, important files, and the next step.

      ## Guardrails

      - Stay read-only.
      - Prefer `context` over reading many files.
      - Keep the result compact and actionable.

      ## Output

      - Answer the question directly.
      - Name the owning symbols or files that support the answer.
      - Give one next step only when it is useful.

      ## Close

      - Stop once you have the minimum evidence needed to answer.
      - If two paths remain plausible, return the top candidates and the
        deciding check instead of continuing to explore.
      - Do not keep tracing once the answer or next step is clear.

  architecture-map:
    description: >-
      Build a compact architecture map of a repo area with pincher MCP
      wrappers (`pincher__invoke_tool`, `pincher__search_tools`,
      `pincher__get_tool_schema`). Use when you need entry points,
      boundaries, and risky touchpoints.
    targets: [cursor, vscode]
    argument_hint: "[repo area, subsystem, or capability]"
    context: fork
    body: |
      # Architecture Map

      Build a high-signal architecture summary through pincher's
      compressed MCP wrappers without reading the whole repo.

      ## Wrapper pattern

      - Use `pincher__search_tools` if you are unsure which pincher
        operation fits.
      - Use `pincher__get_tool_schema` only when the tool input shape is
        unclear.
      - Use `pincher__invoke_tool(tool_name="...", tool_input={...})`
        for `architecture`, `search`, `context`, and `trace`.

      ## Workflow

      1. Call `pincher__invoke_tool(tool_name="architecture", ...)`
         for the repo or subsystem.
      2. Identify entry points, hotspots, and boundary modules.
      3. Use `pincher__invoke_tool(tool_name="search", ...)`,
         `pincher__invoke_tool(tool_name="context", ...)`, and
         `pincher__invoke_tool(tool_name="trace", ...)` only for the
         relevant path.
      4. Return the layers, main flows, risky touchpoints, and the next
         files worth reading.

      ## Output

      - Entry points and boundary modules.
      - Hotspots or risky touchpoints.
      - The next files or symbols worth reading.

      ## Close

      - Stop after one compact map of the requested area.
      - Do not descend into implementation detail unless it is needed to
        explain a boundary, hotspot, or risk.
      - If the request is too broad, name the next slice to map and end.

  change-blast-radius:
    description: >-
      Analyze the blast radius of current or proposed code changes with
      pincher MCP wrappers (`pincher__invoke_tool`,
      `pincher__search_tools`, `pincher__get_tool_schema`). Use before
      review, testing, or commit.
    targets: [cursor, vscode]
    argument_hint: "[staged|unstaged|all|base:<branch>]"
    context: fork
    body: |
      # Change Blast Radius

      Use pincher's compressed MCP wrappers to map a diff to changed
      symbols, impacted callers, and likely validation work.

      ## Wrapper pattern

      - Use `pincher__search_tools` if you are unsure whether `changes`,
        `trace`, or `context` is the right follow-up operation.
      - Use `pincher__get_tool_schema` only when the tool input shape is
        unclear.
      - Use `pincher__invoke_tool(tool_name="...", tool_input={...})`
        to execute `changes`, `trace`, and `context`.

      ## Workflow

      1. Run `pincher__invoke_tool(tool_name="changes", ...)` with the
         requested scope.
      2. Follow up with `pincher__invoke_tool(tool_name="trace", ...)`
         or `pincher__invoke_tool(tool_name="context", ...)` only when
         a changed symbol needs more impact detail.
      3. Group changed symbols by directness and risk.
      4. Call out impacted callers, boundary APIs, and likely tests.
      5. Return changed symbols, risk summary, and recommended validation.

      ## Output

      - Changed symbols grouped by risk.
      - Impacted callers, boundaries, or APIs.
      - Recommended tests or validation to run next.

      ## Close

      - Stop after the first scope that yields an actionable risk summary.
      - If the requested scope has no diff, say so clearly and end.
      - Do not keep widening the search once the validation advice is clear.
