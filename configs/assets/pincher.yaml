backend: pincher
seed_version: 3

rules:
  sections:
    playbook_read_only:
      body: |
        ### `pincher` (codebase intelligence)

        **MANDATORY: For any of the following user intents, your FIRST tool call MUST be a `pincher__*` tool ‚Äî before any `Shell`, `Read`, or `Grep`:**

        | User intent (any phrasing) | Required tool |
        |---|---|
        | summarize / explain / understand this repo, project, or codebase | `pincher__architecture` |
        | summarize / explain the test suite, module, or package | `pincher__architecture` then `pincher__search` |
        | find a function / class / method / symbol named X | `pincher__search` |
        | show me function X / how does X work | `pincher__context` |
        | what calls X / what does X call / impact of changing X | `pincher__trace` |
        | what does my git diff break / blast radius | `pincher__changes` |
        | recall stored architectural decisions / conventions | `pincher__adr` action=`get` or `list` |

        **Forbidden fallbacks** (rule violation if used for the intents above):
        - `Shell` invocations of `pytest --collect-only`, `find`, `tree`, `wc -l`, `ls -R`, `git ls-files`, or pipelines that count or enumerate symbols.
        - `Grep` to find a symbol by name (use `pincher__search`).
        - `Read` on 3+ files in sequence to understand one function (use `pincher__context`).
        If you violate, say so explicitly: "Violating zelosMCP rule because <specific reason>." Silent violations are not acceptable.

        Pincher indexes the repo into a byte-offset symbol store, a knowledge graph, and FTS5 full-text search ‚Äî every retrieval is structured and ~90% cheaper than reading whole files. Canonical read-only workflow:

        - **Orient first.** Call `pincher__architecture` on any unfamiliar project to get language breakdown, entry points, hotspot functions, and graph stats. Cheaper than reading files.
        - **Scope to the active project.** Always pass `project=<basename of git toplevel>` (e.g. `zelosmcp` for this repo) when calling pincher tools ‚Äî omitting it falls through to an empty `default` index. If the per-repo project isn't indexed, fall back to `project=user_data_ro` (the full-tree warm-index covering every repo under `/user_data_ro`). Run `pincher__list` once if you need to confirm available project names.
        - **Find symbols by name.** Use `pincher__search` (FTS5 BM25, supports wildcards `auth*`, phrases `"process order"`, `kind=Function`/`language=Go` filters). Always start here when you don't know the exact symbol ID.
        - **Read source efficiently.** Prefer `pincher__context` over `pincher__symbol` whenever you need a function plus its direct callees in one call (~90% token savings vs reading files).
        - **Batch lookups.** Use `pincher__symbols` (plural, max **100** IDs per call) instead of calling `pincher__symbol` in a loop.
        - **Impact analysis.** Use `pincher__trace` to find inbound or outbound call paths (CRITICAL=depth 1, HIGH=depth 2, MEDIUM=depth 3, LOW=depth 4+).
        - **Pre-commit safety.** Run `pincher__changes` before committing for blast-radius analysis (git diff ‚Üí affected symbols ‚Üí impacted callers with risk labels).
        - **Graph queries.** Use `pincher__query` with the Cypher subset for relationship questions; call `pincher__schema` first to see what node/edge kinds are indexed.
        - **Read persistent knowledge.** `pincher__adr` action=`get`/`list` retrieves architectural decisions, conventions, and gotchas the team has stored across sessions.
        - **Stable IDs.** Symbol IDs follow `{file_path}::{qualified_name}#{kind}` (e.g. `internal/db/db.go::db.Open#Function`).
        - **Do NOT call** `pincher__index` / `pincher__fetch` / `pincher__adr` with action=`set` or `delete` ‚Äî they mutate state and the rule is configured for read-only access.

    playbook_compressed_read_only:
      body: |
        ### `pincher` (codebase intelligence) ‚Äî compressed

        **MANDATORY: pincher is wire-compressed. Your FIRST pincher call MUST use `pincher__invoke_tool` ‚Äî do NOT call `pincher__architecture` etc. directly.**

        | User intent (any phrasing) | How to call |
        |---|---|
        | summarize / explain / understand this repo, project, or codebase | `pincher__invoke_tool(tool_name="architecture", tool_input={"project":"<name>"})` |
        | summarize / explain the test suite, module, or package | `pincher__invoke_tool(tool_name="architecture", ...)` then `pincher__invoke_tool(tool_name="search", ...)` |
        | find a function / class / method / symbol named X | `pincher__invoke_tool(tool_name="search", tool_input={"query":"...", "project":"<name>"})` |
        | show me function X / how does X work | `pincher__invoke_tool(tool_name="context", tool_input={"id":"..."})` |
        | what calls X / what does X call / impact of changing X | `pincher__invoke_tool(tool_name="trace", tool_input={"name":"..."})` |
        | what does my git diff break / blast radius | `pincher__invoke_tool(tool_name="changes", tool_input={})` |
        | recall stored architectural decisions / conventions | `pincher__invoke_tool(tool_name="adr", tool_input={"action":"list"})` |

        **Forbidden fallbacks** (rule violation if used for the intents above):
        - `Shell` invocations of `pytest --collect-only`, `find`, `tree`, `wc -l`, `ls -R`, `git ls-files`, or pipelines that count or enumerate symbols.
        - `Grep` to find a symbol by name (use `pincher__invoke_tool` ‚Üí `search`).
        - `Read` on 3+ files in sequence to understand one function (use `pincher__invoke_tool` ‚Üí `context`).
        - **Calling `pincher__architecture` / `pincher__search` / etc. directly** ‚Äî they are not exposed at `/mcp` when pincher is compressed. The aggregator will return "unknown tool".
        If you violate, say so explicitly: "Violating zelosMCP rule because <specific reason>." Silent violations are not acceptable.

        Pincher indexes the repo into a byte-offset symbol store, a knowledge graph, and FTS5 full-text search ‚Äî every retrieval is structured and ~90% cheaper than reading whole files. Canonical compressed read-only workflow:

        - **Orient first.** `pincher__invoke_tool(tool_name="architecture", tool_input={"project":"<name>"})` ‚Äî language breakdown, entry points, hotspot functions.
        - **Scope to the active project.** Pass `project=<basename of git toplevel>` in every `tool_input`. Fall back to `project=user_data_ro` if the per-repo project isn't indexed. Use `pincher__invoke_tool(tool_name="list", tool_input={})` to confirm available project names.
        - **Find symbols by name.** `pincher__invoke_tool(tool_name="search", tool_input={"query":"..."})` ‚Äî FTS5 BM25; wildcards `auth*`, phrases `"process order"`, `kind=Function`/`language=Go` filters.
        - **Read source efficiently.** `pincher__invoke_tool(tool_name="context", tool_input={"id":"..."})` ‚Äî symbol body + direct imports + callees in one shot (~90% token savings vs reading files).
        - **Batch lookups.** `pincher__invoke_tool(tool_name="symbols", tool_input={"ids":[...]})` ‚Äî up to 100 IDs in one round trip.
        - **Impact analysis.** `pincher__invoke_tool(tool_name="trace", tool_input={"name":"..."})` ‚Äî CRITICAL=depth 1, HIGH=2, MEDIUM=3.
        - **Pre-commit safety.** `pincher__invoke_tool(tool_name="changes", tool_input={})` before committing.
        - **Graph queries.** `pincher__invoke_tool(tool_name="query", tool_input={"pinchql":"MATCH ..."})` ‚Äî call `pincher__invoke_tool(tool_name="schema")` first.
        - **Read persistent knowledge.** `pincher__invoke_tool(tool_name="adr", tool_input={"action":"list"})` ‚Äî architectural decisions and gotchas stored across sessions.
        - **Stable IDs.** `{file_path}::{qualified_name}#{kind}` (e.g. `internal/db/db.go::db.Open#Function`).
        - **Do NOT invoke** `tool_name="index"`, `tool_name="fetch"`, or `tool_name="adr"` with `action=set`/`delete` ‚Äî they mutate state and the rule is read-only.

