---
# Integration tests against the dev container (Python flavour).
#
# Same shape as the Go flavour but reads version from pyproject.toml and
# installs Python-side test deps. See integration-test.yml.go.tmpl for the
# overall pattern.
name: integration-tests

on:
  workflow_run:
    workflows: ["release"]
    types: [completed]
    branches: [develop]

permissions:
  contents: read
  packages: read
  statuses: write

jobs:
  integration:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest httpx

      - name: Read version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(grep -E '^version' pyproject.toml | head -1 | awk -F'"' '{print $2}')
          [ -n "$VERSION" ] || { echo "::error::no version in pyproject.toml"; exit 1; }
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull dev image
        env:
          IMAGE: ghcr.io/zelosai/${{ github.event.repository.name }}:v${{ steps.version.outputs.version }}-dev
        run: |
          set -euo pipefail
          docker pull "$IMAGE"
          echo "ZELOS_DEV_IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: make test-integration
        run: make test-integration

      - name: Post status check on develop HEAD
        if: always()
        env:
          SHA: ${{ github.event.workflow_run.head_sha }}
          STATE: ${{ job.status == 'success' && 'success' || 'failure' }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh api -X POST \
            "repos/${{ github.repository }}/statuses/${SHA}" \
            -f state="${STATE}" \
            -f context="integration-tests" \
            -f target_url="${RUN_URL}" \
            -f description="integration tests against :v${{ steps.version.outputs.version }}-dev"
